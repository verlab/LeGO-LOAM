# HDL-32E LiDAR Configuration
# Velodyne HDL-32E specifications

# LiDAR model name
model: "HDL-32E"

# Point cloud and IMU topic configuration
topics:
  point_cloud: "/velodyne_points"
  imu: "/imu/data"

# Scan configuration
scan:
  N_SCAN: 32                    # Number of scan lines
  Horizon_SCAN: 1800           # Number of points per scan line
  ang_res_x: 0.2               # Horizontal angular resolution (360°/1800)
  ang_res_y: 1.333             # Vertical angular resolution (41.33°/31 intervals)
  ang_bottom: 30.67            # Bottom beam angle offset (degrees)
  groundScanInd: 20            # Ground scan index for ground detection

# Ring channel configuration
useCloudRing: true             # Use ring channel for projection if available

# File output configuration
fileDirectory: "/tmp/"         # Directory for saving PCD files

# Sensor mounting configuration
sensorMountAngle: 0.0          # Sensor mount angle (degrees)
sensorMinimumRange: 1.0        # Minimum sensor range (meters)

# Processing parameters
scanPeriod: 0.1                # Scan period (seconds)
systemDelay: 0                 # System delay compensation
imuQueLength: 200              # IMU queue length for processing
